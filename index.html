        .event-custom-input:focus { outline: none; border-color: #cbd5e1; background-color: #ffffff; box-shadow: none; }

        .admin-profile-img { display: none; width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid transparent; transition: all 0.2s; }
        #adminBtn.logged-in, #adminBtn.admin-active, body.admin-mode #adminBtn { min-width: 0 !important; width: 36px !important; height: 36px !important; padding: 0 !important; border-radius: 50% !important; background: transparent !important; }
        #adminBtn.logged-in .login-text, #adminBtn.admin-active .login-text, body.admin-mode #adminBtn .login-text { display: none; }
        #adminBtn.logged-in .admin-profile-img, #adminBtn.admin-active .admin-profile-img, body.admin-mode #adminBtn .admin-profile-img { display: block; }
        #adminBtn:hover .admin-profile-img { border-color: var(--point-pink); }
        @keyframes force-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
